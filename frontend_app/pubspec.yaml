name: frontend_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  cupertino_icons: ^1.0.6
  image_picker: ^1.2.1
  mobile_scanner: ^5.2.3
  
  # ✅ เพิ่ม package camera สำหรับเปิดกล้องในหน้าสแกน
  camera: ^0.10.5+9 

  # ✅ เพิ่มเพื่อให้ NotificationSettings ใช้งานจริง
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.3.2
  timezone: ^0.9.4

  # ✅ เพิ่ม package สำหรับทำหลายภาษา
  easy_localization: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ✅ แก้ไขตรงนี้ ระบุชื่อไฟล์ลงไปตรงๆ เพื่อแก้ปัญหาหาโฟลเดอร์ไม่เจอ
  assets:
    - assets/langs/en.json
    - assets/langs/th.json